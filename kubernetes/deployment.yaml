# Image GHCR — tag :<sha> mis à jour par GitHub Actions après chaque build (commit bot).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit
  namespace: habit
  labels:
    app.kubernetes.io/name: habit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: habit
  template:
    metadata:
      labels:
        app: habit
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: app
          image: ghcr.io/vinzlac/habit:44ba3581c83b1642005c3108caca180392d6a599
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
