# Image GHCR — tag :<sha> mis à jour par GitHub Actions après chaque build (commit bot).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit
  namespace: habit
  labels:
    app.kubernetes.io/name: habit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: habit
  template:
    metadata:
      labels:
        app: habit
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/vinzlac/habit:a5da54864393237238b616335bb692b9c98cabd7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
